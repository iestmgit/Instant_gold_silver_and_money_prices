<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>قیمت لحظه‌ای طلا و ارز</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:tahoma;
background:#f4f6fb;
padding:30px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

.price{
font-size:20px;
font-weight:bold;
color:#059669
}

</style>

</head>

<body>

<h1>داشبورد قیمت طلا سکه و ارز</h1>

<h2>طلا</h2>
<div class="grid" id="gold"></div>

<h2>سکه</h2>
<div class="grid" id="coin"></div>

<h2>ارز</h2>
<div class="grid" id="currency"></div>

<script>

const charts={}

function number(x){
return Number(x).toLocaleString()
}

function createCard(item,container){

const id=item.name.replace(/\s/g,"")

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div>${item.name}</div>

<div class="price" id="price_${id}">
${number(item.price)}
</div>

<canvas id="chart_${id}"></canvas>

`

document.getElementById(container).appendChild(div)

const ctx=document.getElementById(`chart_${id}`)

charts[id]=new Chart(ctx,{
type:"line",
data:{
labels:[""],
datasets:[{
data:[item.price],
borderColor:"#2563eb",
fill:true,
backgroundColor:"rgba(37,99,235,0.1)"
}]
},
options:{
plugins:{legend:{display:false}}
}
})

}

function updateChart(item){

const id=item.name.replace(/\s/g,"")

const chart=charts[id]

if(!chart) return

chart.data.labels.push("")
chart.data.datasets[0].data.push(item.price)

if(chart.data.labels.length>20){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

document.getElementById(`price_${id}`).innerText=
number(item.price)

}

async function load(){

const res=await fetch("/api/prices")
const json=await res.json()

const data=json.data

data.gold.forEach(i=>{
if(!charts[i.name.replace(/\s/g,"")])
createCard(i,"gold")
else
updateChart(i)
})

data.coin.forEach(i=>{
if(!charts[i.name.replace(/\s/g,"")])
createCard(i,"coin")
else
updateChart(i)
})

data.currency.forEach(i=>{
if(!charts[i.name.replace(/\s/g,"")])
createCard(i,"currency")
else
updateChart(i)
})

}

load()

setInterval(load,30000)

</script>

</body>
</html>
