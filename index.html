<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>داشبورد لحظه‌ای TGJU</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Tahoma, Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #1d4ed8;
      margin-bottom: 10px;
    }

    .status {
      text-align: center;
      margin-bottom: 30px;
      color: #6b7280;
      font-size: 14px;
    }

    h2 {
      margin-top: 40px;
      color: #111827;
      border-right: 5px solid #2563eb;
      padding-right: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      font-size: 17px;
      font-weight: bold;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: #dcfce7;
      color: #047857;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .price {
      font-size: 21px;
      font-weight: bold;
      color: #059669;
      direction: ltr;
      text-align: right;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    canvas {
      width: 100%;
      height: 180px;
      margin-top: 10px;
    }

    .empty {
      padding: 22px;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>داشبورد لحظه‌ای قیمت طلا، سکه و ارز</h1>

    <div class="status" id="status">
      در حال دریافت اطلاعات...
    </div>

    <h2>طلا</h2>
    <div class="grid" id="goldGrid"></div>

    <h2>سکه</h2>
    <div class="grid" id="coinGrid"></div>

    <h2>ارز آزاد</h2>
    <div class="grid" id="currencyGrid"></div>
  </div>

  <script>
    const charts = {};
    const UPDATE_INTERVAL = 30000;

    function formatNumber(num) {
      if (num === null || num === undefined || Number.isNaN(num)) return "-";
      return Math.round(num).toLocaleString("en-US");
    }

    function nowTimeFa() {
      return new Date().toLocaleTimeString("fa-IR");
    }

    function setStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.innerHTML = message;
      status.style.color = isError ? "#b91c1c" : "#6b7280";
    }

    function normalizeId(text) {
      return text
        .toString()
        .replace(/\s+/g, "_")
        .replace(/[^\u0600-\u06FFa-zA-Z0-9_]/g, "");
    }

    function createOrUpdateCard(item, containerId, category) {
      const safeId = `${category}_${normalizeId(item.name)}`;
      const cardId = `card_${safeId}`;
      const priceId = `price_${safeId}`;
      const changeId = `change_${safeId}`;
      const timeId = `time_${safeId}`;
      const minId = `min_${safeId}`;
      const maxId = `max_${safeId}`;
      const canvasId = `chart_${safeId}`;

      let card = document.getElementById(cardId);

      if (!card) {
        const container = document.getElementById(containerId);

        card = document.createElement("div");
        card.className = "card";
        card.id = cardId;

        card.innerHTML = `
          <div class="card-header">
            <div class="title">${item.name}</div>
            <div class="badge">Real TGJU</div>
          </div>

          <div class="price" id="${priceId}">
            ${formatNumber(item.price)}
          </div>

          <div class="meta">
            <span id="${changeId}">تغییر: ${item.change || "-"}</span>
            <span id="${timeId}">زمان: ${item.time || "-"}</span>
          </div>

          <div class="meta">
            <span id="${minId}">کمترین: ${item.min || "-"}</span>
            <span id="${maxId}">بیشترین: ${item.max || "-"}</span>
          </div>

          <canvas id="${canvasId}"></canvas>
        `;

        container.appendChild(card);

        const ctx = document.getElementById(canvasId).getContext("2d");

        charts[safeId] = new Chart(ctx, {
          type: "line",
          data: {
            labels: [nowTimeFa()],
            datasets: [
              {
                label: item.name,
                data: [item.price],
                borderColor: "#2563eb",
                backgroundColor: "rgba(37, 99, 235, 0.12)",
                fill: true,
                tension: 0.35,
                pointRadius: 2,
                pointHoverRadius: 5
              }
            ]
          },
          options: {
            responsive: true,
            animation: {
              duration: 500
            },
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                rtl: true,
                callbacks: {
                  label: function(context) {
                    return formatNumber(context.raw);
                  }
                }
              }
            },
            scales: {
              x: {
                ticks: {
                  maxTicksLimit: 5
                }
              },
              y: {
                ticks: {
                  callback: function(value) {
                    return formatNumber(value);
                  }
                }
              }
            }
          }
        });
      } else {
        document.getElementById(priceId).innerText = formatNumber(item.price);
        document.getElementById(changeId).innerText = `تغییر: ${item.change || "-"}`;
        document.getElementById(timeId).innerText = `زمان: ${item.time || nowTimeFa()}`;
        document.getElementById(minId).innerText = `کمترین: ${item.min || "-"}`;
        document.getElementById(maxId).innerText = `بیشترین: ${item.max || "-"}`;

        const chart = charts[safeId];

        chart.data.labels.push(nowTimeFa());
        chart.data.datasets[0].data.push(item.price);

        if (chart.data.labels.length > 30) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }

        chart.update();
      }
    }

    function renderEmptyIfNeeded(containerId, items) {
      const container = document.getElementById(containerId);

      if (!items || items.length === 0) {
        if (!container.querySelector(".empty")) {
          container.innerHTML = `
            <div class="empty">
              داده‌ای برای این بخش پیدا نشد.
            </div>
          `;
        }
      } else {
        const empty = container.querySelector(".empty");
        if (empty) empty.remove();
      }
    }

    async function fetchPrices() {
      try {
        setStatus("در حال بروزرسانی قیمت‌ها...");

        const response = await fetch("/api/prices");
        const json = await response.json();

        if (!json.success) {
          throw new Error(json.message || "خطا در دریافت اطلاعات");
        }

        const data = json.data;

        renderEmptyIfNeeded("goldGrid", data.gold);
        renderEmptyIfNeeded("coinGrid", data.coin);
        renderEmptyIfNeeded("currencyGrid", data.currency);

        data.gold.forEach(item => {
          createOrUpdateCard(item, "goldGrid", "gold");
        });

        data.coin.forEach(item => {
          createOrUpdateCard(item, "coinGrid", "coin");
        });

        data.currency.forEach(item => {
          createOrUpdateCard(item, "currencyGrid", "currency");
        });

        setStatus(
          `آخرین بروزرسانی: ${nowTimeFa()} | منبع: TGJU | بروزرسانی بعدی تا ${UPDATE_INTERVAL / 1000} ثانیه دیگر`
        );
      } catch (error) {
        console.error(error);

        setStatus(
          `خطا در بروزرسانی: ${error.message}`,
          true
        );
      }
    }

    fetchPrices();

    setInterval(fetchPrices, UPDATE_INTERVAL);
  </script>
</body>
</html>
